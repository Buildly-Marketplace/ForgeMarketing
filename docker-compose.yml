version: "3.8"

services:
  buildly:
    build: .
    ports:
      - "${GATEWAY_PORT:-80}:8080"
    env_file:
      - .env
    environment:
      - MARKETING_URL=http://localhost/marketing
      - PRODUCER_URL=http://localhost/producer
      - DJANGO_SETTINGS_MODULE=logic_service.settings.docker
      - RUNNING_IN_DOCKER=1
    volumes:
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-logic_service}
      POSTGRES_USER: ${DATABASE_USER:-root}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-root}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-root}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  app-data:
  pg-data:
