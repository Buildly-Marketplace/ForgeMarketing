<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen" x-data="userManager()">
        <!-- Header -->
        <header class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 py-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-3xl font-bold text-gray-900">
                        <i class="fas fa-users-cog mr-2"></i>User Management
                    </h1>
                    <div class="flex items-center space-x-4">
                        <span class="text-sm text-gray-600" x-text="users.length + ' users'"></span>
                        <a href="/admin/brands" class="text-sm text-blue-600 hover:text-blue-700">
                            <i class="fas fa-building mr-1"></i>Brands
                        </a>
                        <a href="/" class="text-sm text-gray-600 hover:text-gray-700">
                            <i class="fas fa-arrow-left mr-1"></i>Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Alert -->
            <div x-show="alert.show" x-transition
                 :class="alert.type === 'success' ? 'bg-green-50 text-green-800 border-green-200' : 'bg-red-50 text-red-800 border-red-200'"
                 class="mb-6 p-4 rounded-lg border">
                <span x-text="alert.message"></span>
            </div>

            <!-- Actions Bar -->
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-lg font-medium text-gray-900">All Users</h2>
                <button @click="openCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">
                    <i class="fas fa-user-plus mr-2"></i>Add User
                </button>
            </div>

            <!-- Users Table -->
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">User</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Brands</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Last Login</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <template x-for="user in users" :key="user.id">
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4">
                                    <div class="font-medium text-gray-900" x-text="user.display_name || user.email"></div>
                                    <div class="text-sm text-gray-500" x-text="user.email"></div>
                                </td>
                                <td class="px-6 py-4">
                                    <span x-show="user.is_admin"
                                          class="px-2 py-1 text-xs font-medium bg-purple-100 text-purple-800 rounded-full">Admin</span>
                                    <span x-show="!user.is_admin"
                                          class="px-2 py-1 text-xs font-medium bg-gray-100 text-gray-700 rounded-full">User</span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-600">
                                    <span x-text="user.brands ? user.brands.join(', ') : '—'"></span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-500" x-text="user.last_login_at ? new Date(user.last_login_at).toLocaleDateString() : 'Never'"></td>
                                <td class="px-6 py-4">
                                    <span x-show="user.is_active !== false"
                                          class="px-2 py-1 text-xs font-medium bg-green-100 text-green-800 rounded-full">Active</span>
                                    <span x-show="user.is_active === false"
                                          class="px-2 py-1 text-xs font-medium bg-red-100 text-red-800 rounded-full">Disabled</span>
                                </td>
                                <td class="px-6 py-4 text-right space-x-2">
                                    <button @click="openEditModal(user)" class="text-blue-600 hover:text-blue-800 text-sm">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button @click="deactivateUser(user)" class="text-red-600 hover:text-red-800 text-sm">
                                        <i class="fas fa-user-slash"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>

            <!-- Create / Edit Modal -->
            <div x-show="showModal" x-transition class="fixed inset-0 z-50 overflow-y-auto" style="display:none;">
                <div class="flex items-center justify-center min-h-screen px-4">
                    <div class="fixed inset-0 bg-gray-500 bg-opacity-50" @click="showModal = false"></div>
                    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full relative z-10 p-6">
                        <h3 class="text-lg font-medium mb-4" x-text="editingUser ? 'Edit User' : 'Add User'"></h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" x-model="form.email" class="w-full border rounded-md px-3 py-2 text-sm" placeholder="user@example.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                                <input type="text" x-model="form.display_name" class="w-full border rounded-md px-3 py-2 text-sm" placeholder="Jane Doe">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1" x-text="editingUser ? 'New Password (leave blank to keep)' : 'Password'"></label>
                                <input type="password" x-model="form.password" class="w-full border rounded-md px-3 py-2 text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Brand Access</label>
                                <div class="space-y-1 max-h-40 overflow-y-auto border rounded-md p-2">
                                    <template x-for="brand in brands" :key="brand.id">
                                        <label class="flex items-center space-x-2 text-sm">
                                            <input type="checkbox" :value="brand.id"
                                                   :checked="form.brand_ids.includes(brand.id)"
                                                   @change="toggleBrand(brand.id)" class="rounded">
                                            <span x-text="brand.display_name || brand.name"></span>
                                        </label>
                                    </template>
                                </div>
                            </div>
                            <div class="flex items-center space-x-4">
                                <label class="flex items-center space-x-2 text-sm">
                                    <input type="checkbox" x-model="form.is_admin" class="rounded">
                                    <span>Admin</span>
                                </label>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-end space-x-3">
                            <button @click="showModal = false" class="px-4 py-2 text-sm text-gray-700 bg-gray-100 rounded-md hover:bg-gray-200">Cancel</button>
                            <button @click="saveUser()" class="px-4 py-2 text-sm text-white bg-blue-600 rounded-md hover:bg-blue-700">
                                <span x-text="editingUser ? 'Update' : 'Create'"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function userManager() {
            return {
                users: [],
                brands: [],
                showModal: false,
                editingUser: null,
                form: { email: '', display_name: '', password: '', is_admin: false, brand_ids: [] },
                alert: { show: false, type: '', message: '' },

                init() {
                    this.loadUsers();
                    this.loadBrands();
                },

                async loadUsers() {
                    const res = await fetch('/api/admin/users');
                    const data = await res.json();
                    if (data.success) this.users = data.users;
                },

                async loadBrands() {
                    const res = await fetch('/api/admin/brands');
                    const data = await res.json();
                    if (data.success) this.brands = data.brands;
                },

                openCreateModal() {
                    this.editingUser = null;
                    this.form = { email: '', display_name: '', password: '', is_admin: false, brand_ids: [] };
                    this.showModal = true;
                },

                openEditModal(user) {
                    this.editingUser = user;
                    this.form = {
                        email: user.email,
                        display_name: user.display_name || '',
                        password: '',
                        is_admin: user.is_admin,
                        brand_ids: (user.brands || []).map(b => {
                            const found = this.brands.find(br => br.name === b);
                            return found ? found.id : null;
                        }).filter(Boolean),
                    };
                    this.showModal = true;
                },

                toggleBrand(id) {
                    const idx = this.form.brand_ids.indexOf(id);
                    if (idx > -1) this.form.brand_ids.splice(idx, 1);
                    else this.form.brand_ids.push(id);
                },

                async saveUser() {
                    const payload = { ...this.form };
                    if (this.editingUser && !payload.password) delete payload.password;

                    const url = this.editingUser ? `/api/admin/users/${this.editingUser.id}` : '/api/admin/users';
                    const method = this.editingUser ? 'PUT' : 'POST';
                    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await res.json();

                    if (data.success) {
                        this.showAlert('success', this.editingUser ? 'User updated' : 'User created');
                        this.showModal = false;
                        this.loadUsers();
                    } else {
                        this.showAlert('error', data.error || 'Failed to save user');
                    }
                },

                async deactivateUser(user) {
                    if (!confirm(`Deactivate ${user.email}?`)) return;
                    const res = await fetch(`/api/admin/users/${user.id}`, { method: 'DELETE' });
                    const data = await res.json();
                    if (data.success) {
                        this.showAlert('success', data.message);
                        this.loadUsers();
                    } else {
                        this.showAlert('error', data.error);
                    }
                },

                showAlert(type, message) {
                    this.alert = { show: true, type, message };
                    setTimeout(() => this.alert.show = false, 4000);
                }
            };
        }
    </script>
</body>
</html>
