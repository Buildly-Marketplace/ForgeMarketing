replicaCount: 1

image:
  repository: buildly/forgemark
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: forgemark.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: forgemark-tls
      hosts:
        - forgemark.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  FLASK_ENV: production
  OLLAMA_HOST: ollama:11434

postgres:
  enabled: true
  auth:
    username: forgemark
    password: changeme
    database: forgemark

ollama:
  enabled: true
  model: mistral
