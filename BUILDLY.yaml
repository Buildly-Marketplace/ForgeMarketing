name: ForgeMarketing
slug: forgemarketing
version: 1.0.0
summary: AI-powered marketing automation system for multi-brand outreach, content generation, and campaign management with unified analytics dashboard.
license: BSL-1.1->Apache-2.0
license_change_date: "2026-11-08"
categories:
  - marketing
  - automation
  - ai
  - analytics
targets:
  - docker
  - k8s
  - github-pages
author: ForgeMarketing contributors
homepage: https://github.com/Buildly-Marketplace/ForgeMarketing
repository: https://github.com/Buildly-Marketplace/ForgeMarketing
description: |
  ForgeMarketing is a human-in-the-loop marketing operations platform designed for
  managing multiple brands from a single dashboard. It features content planning,
  template-driven workflows, unified analytics, manual task tracking, and review gates.
  
  Key capabilities:
  - Multi-brand management for products, companies, and campaigns
  - AI content generation via Ollama integration
  - Human-reviewed email and social workflows
  - Influencer discovery and outreach
  - Campaign analytics and reporting
  - Google Ads coordination support

# Docker target configuration
docker:
  image: forgemarketing/forgemarketing
  ports:
    - "5000:5000"
  environment:
    - FLASK_ENV=production
    - OLLAMA_HOST=localhost:11434

# Kubernetes target configuration  
k8s:
  helm_chart_path: ops/helm/forgemark
  values_example: ops/helm/forgemark/values-example.yaml

# GitHub Pages target (for dashboard)
github-pages:
  template_repo: Buildly-Marketplace/ForgeMarketing
  actions_workflow: .github/workflows/pages.yml
  build_command: "cd dashboard && python build_static.py"
  
# Documentation
docs: devdocs/

# Support and pricing
support:
  type: community
  response_time: "48 hours"
  channels:
    - github-issues
    - discord
    
# Marketplace configuration
forge:
  price_cents: 0  # Free/open source
  trial_days: 0
  labs_discount_percent: 0