<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Brand Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen" x-data="adminPanel()">
        <!-- Header -->
        <header class="bg-white shadow">
            <div class="max-w-7xl mx-auto px-4 py-6">
                <div class="flex justify-between items-center">
                    <h1 class="text-3xl font-bold text-gray-900">
                        <i class="fas fa-cog mr-2"></i>Admin Panel
                    </h1>
                    <div class="text-sm text-gray-600">
                        <i class="fas fa-database mr-2"></i>
                        <span x-text="brandCount + ' brands configured'"></span>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 py-8">
            <!-- Navigation Tabs -->
            <div class="mb-8 border-b border-gray-200">
                <nav class="flex space-x-8" aria-label="Tabs">
                    <button @click="activeTab = 'brands'"
                            :class="{'border-blue-500 text-blue-600': activeTab === 'brands', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'brands'}"
                            class="py-2 px-1 border-b-2 font-medium text-sm">
                        <i class="fas fa-building mr-2"></i>Brands
                    </button>
                    <button @click="activeTab = 'email-configs'"
                            :class="{'border-blue-500 text-blue-600': activeTab === 'email-configs', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'email-configs'}"
                            class="py-2 px-1 border-b-2 font-medium text-sm">
                        <i class="fas fa-envelope mr-2"></i>Email Configs
                    </button>
                    <button @click="activeTab = 'audit'"
                            :class="{'border-blue-500 text-blue-600': activeTab === 'audit', 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300': activeTab !== 'audit'}"
                            class="py-2 px-1 border-b-2 font-medium text-sm">
                        <i class="fas fa-history mr-2"></i>Audit Logs
                    </button>
                </nav>
            </div>

            <!-- Brands Tab -->
            <section x-show="activeTab === 'brands'" class="space-y-6">
                <!-- Add Brand Button -->
                <div class="flex justify-end">
                    <button @click="showAddBrandModal = true"
                            class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-plus mr-2"></i>Add Brand
                    </button>
                </div>

                <!-- Brands Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="brand in brands" :key="brand.id">
                        <div class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-lg font-semibold text-gray-900" x-text="brand.display_name"></h3>
                                    <p class="text-sm text-gray-600" x-text="brand.name"></p>
                                </div>
                                <div class="flex space-x-2">
                                    <button @click="selectBrand(brand); showBrandDetailModal = true"
                                            class="text-blue-600 hover:text-blue-800">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button @click="deleteBrand(brand.id)"
                                            class="text-red-600 hover:text-red-800">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-sm text-gray-600 mb-4" x-text="brand.description"></p>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-600">Status:</span>
                                    <span :class="brand.is_active ? 'text-green-600' : 'text-red-600'"
                                          x-text="brand.is_active ? 'Active' : 'Inactive'"></span>
                                </div>
                                <div>
                                    <span class="text-gray-600">Email Configs:</span>
                                    <span x-text="brand.email_configs_count"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Email Configs Tab -->
            <section x-show="activeTab === 'email-configs'" class="space-y-6">
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Brand</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Provider</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">From Email</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Primary</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Verified</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-700 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <template x-for="config in emailConfigs" :key="config.id">
                                <tr>
                                    <td class="px-6 py-4 text-sm text-gray-900" x-text="config.brand_name"></td>
                                    <td class="px-6 py-4 text-sm">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                              :class="{'bg-blue-100 text-blue-800': config.provider === 'brevo', 'bg-purple-100 text-purple-800': config.provider === 'mailersend'}">
                                            <i class="fas fa-envelope mr-1"></i>
                                            <span x-text="config.provider"></span>
                                        </span>
                                    </td>
                                    <td class="px-6 py-4 text-sm text-gray-600" x-text="config.from_email"></td>
                                    <td class="px-6 py-4 text-sm">
                                        <i class="fas fa-check-circle"
                                           :class="{'text-green-600': config.is_primary, 'text-gray-300': !config.is_primary}"></i>
                                    </td>
                                    <td class="px-6 py-4 text-sm">
                                        <i class="fas fa-check-circle"
                                           :class="{'text-green-600': config.is_verified, 'text-red-600': !config.is_verified}"></i>
                                    </td>
                                    <td class="px-6 py-4 text-sm space-x-2">
                                        <button @click="selectEmailConfig(config); showEmailConfigModal = true"
                                                class="text-blue-600 hover:text-blue-800">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button @click="testEmailConfig(config)"
                                                class="text-green-600 hover:text-green-800">
                                            <i class="fas fa-flask"></i>
                                        </button>
                                        <button @click="deleteEmailConfig(config)"
                                                class="text-red-600 hover:text-red-800">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Audit Logs Tab -->
            <section x-show="activeTab === 'audit'" class="space-y-6">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Recent Activity</h2>
                    <div class="space-y-4">
                        <template x-for="log in auditLogs" :key="log.id">
                            <div class="border-l-4 pl-4 py-2"
                                 :class="{'border-green-500': log.success, 'border-red-500': !log.success}">
                                <div class="flex justify-between">
                                    <div>
                                        <p class="font-semibold text-gray-900">
                                            <span x-text="`${log.action.toUpperCase()}: Brand #${log.brand_id}`"></span>
                                        </p>
                                        <p class="text-sm text-gray-600" x-text="log.action_by"></p>
                                    </div>
                                    <span class="text-sm text-gray-500" x-text="new Date(log.created_at).toLocaleString()"></span>
                                </div>
                                <p v-if="log.error_message" class="text-sm text-red-600 mt-1" x-text="log.error_message"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </main>

        <!-- Add Brand Modal -->
        <div x-show="showAddBrandModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
                <div class="p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Add New Brand</h2>
                    <form @submit.prevent="addBrand" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Brand Name</label>
                            <input x-model="newBrand.name" type="text" placeholder="e.g., mynewbrand" 
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Display Name</label>
                            <input x-model="newBrand.display_name" type="text" placeholder="e.g., My New Brand"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                            <textarea x-model="newBrand.description" placeholder="Brief description"
                                      class="w-full border border-gray-300 rounded-lg px-3 py-2"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Website URL</label>
                            <input x-model="newBrand.website_url" type="url" placeholder="https://example.com"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                        <div class="flex justify-end space-x-3 mt-6">
                            <button type="button" @click="showAddBrandModal = false"
                                    class="px-4 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">
                                Cancel
                            </button>
                            <button type="submit"
                                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                Create Brand
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Brand Detail Modal -->
        <div x-show="showBrandDetailModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-96 overflow-y-auto">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-lg font-semibold text-gray-900" x-text="selectedBrand?.display_name"></h2>
                        <button @click="showBrandDetailModal = false" class="text-gray-500 hover:text-gray-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <!-- Email Configs for this brand -->
                    <div class="mt-6">
                        <h3 class="font-semibold text-gray-900 mb-3">Email Configurations</h3>
                        <div class="space-y-3">
                            <template x-for="config in selectedBrand?.email_configs || []" :key="config.id">
                                <div class="border border-gray-200 rounded-lg p-4">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="font-medium" x-text="config.provider.toUpperCase()"></p>
                                            <p class="text-sm text-gray-600" x-text="config.from_email"></p>
                                        </div>
                                        <div class="text-sm">
                                            <span x-text="config.is_primary ? 'PRIMARY' : ''"
                                                  class="text-green-600 font-semibold"></span>
                                            <span x-text="config.is_verified ? 'VERIFIED' : 'NOT VERIFIED'"
                                                  :class="config.is_verified ? 'text-green-600' : 'text-red-600'"
                                                  class="font-semibold"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <button @click="showAddEmailConfigModal = true"
                                class="mt-3 w-full py-2 px-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 text-sm">
                            <i class="fas fa-plus mr-2"></i>Add Email Configuration
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Email Config Modal -->
        <div x-show="showEmailConfigModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
                <div class="p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4">Email Configuration</h2>
                    <form @submit.prevent="updateEmailConfig" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Provider</label>
                            <p class="text-sm text-gray-600" x-text="selectedEmailConfig?.provider"></p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">From Email</label>
                            <input x-model="selectedEmailConfig.from_email" type="email"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">From Name</label>
                            <input x-model="selectedEmailConfig.from_name" type="text"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Max Send Per Day</label>
                            <input x-model.number="selectedEmailConfig.max_send_per_day" type="number"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                        <div class="flex items-center">
                            <input x-model="selectedEmailConfig.is_primary" type="checkbox" id="is_primary"
                                   class="rounded border-gray-300">
                            <label for="is_primary" class="ml-2 text-sm text-gray-700">Set as Primary</label>
                        </div>
                        <div class="flex justify-end space-x-3 mt-6">
                            <button type="button" @click="showEmailConfigModal = false"
                                    class="px-4 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">
                                Cancel
                            </button>
                            <button type="submit"
                                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminPanel() {
            return {
                activeTab: 'brands',
                brands: [],
                emailConfigs: [],
                auditLogs: [],
                brandCount: 0,
                selectedBrand: null,
                selectedEmailConfig: null,
                newBrand: {},
                showAddBrandModal: false,
                showBrandDetailModal: false,
                showEmailConfigModal: false,
                showAddEmailConfigModal: false,

                async init() {
                    await this.loadBrands();
                    await this.loadEmailConfigs();
                    await this.loadAuditLogs();
                },

                async loadBrands() {
                    try {
                        const response = await fetch('/api/admin/brands');
                        const data = await response.json();
                        if (data.success) {
                            this.brands = data.brands;
                            this.brandCount = data.total;
                        }
                    } catch (error) {
                        console.error('Error loading brands:', error);
                        alert('Failed to load brands');
                    }
                },

                async loadEmailConfigs() {
                    try {
                        const configs = [];
                        for (const brand of this.brands) {
                            const response = await fetch(`/api/admin/brands/${brand.name}/email-configs`);
                            const data = await response.json();
                            if (data.success) {
                                for (const config of data.configs) {
                                    config.brand_name = brand.display_name;
                                    configs.push(config);
                                }
                            }
                        }
                        this.emailConfigs = configs;
                    } catch (error) {
                        console.error('Error loading email configs:', error);
                    }
                },

                async loadAuditLogs() {
                    try {
                        const logs = [];
                        for (const brand of this.brands.slice(0, 5)) {
                            const response = await fetch(`/api/admin/audit-logs/${brand.name}?limit=5`);
                            const data = await response.json();
                            if (data.success) {
                                logs.push(...data.logs);
                            }
                        }
                        this.auditLogs = logs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20);
                    } catch (error) {
                        console.error('Error loading audit logs:', error);
                    }
                },

                selectBrand(brand) {
                    this.selectedBrand = brand;
                },

                selectEmailConfig(config) {
                    this.selectedEmailConfig = { ...config };
                },

                async addBrand() {
                    try {
                        const response = await fetch('/api/admin/brands', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.newBrand)
                        });
                        const data = await response.json();
                        if (data.success) {
                            alert('Brand created successfully');
                            this.showAddBrandModal = false;
                            this.newBrand = {};
                            await this.loadBrands();
                        } else {
                            alert('Error: ' + data.error);
                        }
                    } catch (error) {
                        console.error('Error creating brand:', error);
                        alert('Failed to create brand');
                    }
                },

                async updateEmailConfig() {
                    try {
                        const brandName = this.selectedBrand.name;
                        const response = await fetch(`/api/admin/brands/${brandName}/email-configs/${this.selectedEmailConfig.provider}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.selectedEmailConfig)
                        });
                        const data = await response.json();
                        if (data.success) {
                            alert('Configuration updated');
                            this.showEmailConfigModal = false;
                            await this.loadEmailConfigs();
                        } else {
                            alert('Error: ' + data.error);
                        }
                    } catch (error) {
                        console.error('Error updating config:', error);
                        alert('Failed to update configuration');
                    }
                },

                async testEmailConfig(config) {
                    alert(`Testing ${config.provider} configuration...\nThis would send a test email to verify the API key.`);
                },

                async deleteEmailConfig(config) {
                    if (!confirm(`Delete ${config.provider} configuration for ${config.brand_name}?`)) return;
                    try {
                        const response = await fetch(`/api/admin/brands/${config.brand_name}/email-configs/${config.provider}`, {
                            method: 'DELETE'
                        });
                        const data = await response.json();
                        if (data.success) {
                            alert('Configuration deleted');
                            await this.loadEmailConfigs();
                        }
                    } catch (error) {
                        console.error('Error deleting config:', error);
                        alert('Failed to delete configuration');
                    }
                },

                async deleteBrand(brandId) {
                    if (!confirm('Are you sure? This will delete the brand and all its configurations.')) return;
                    alert('Delete functionality would be implemented here');
                }
            }
        }

        // Initialize on page load
        document.addEventListener('alpine:init', () => {
            // Call init after Alpine initializes
            setTimeout(() => {
                document.querySelector('[x-data*="adminPanel"]').__x.$data.init();
            }, 100);
        });

        // Manual init if Alpine is already loaded
        if (window.Alpine) {
            const app = document.querySelector('[x-data*="adminPanel"]').__x.$data;
            if (app) app.init();
        }
    </script>
</body>
</html>
