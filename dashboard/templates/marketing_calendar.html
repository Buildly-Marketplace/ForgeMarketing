{% extends "base.html" %}

{% block content %}
<div class="space-y-6" x-data="marketingCalendar()" x-init="loadCampaigns()">
    <!-- Header -->
    <div class="bg-white rounded-lg p-6 card-shadow">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">📅 Marketing Calendar</h1>
                <p class="text-gray-600 mt-2">Manage campaigns, tasks, and track marketing performance across all brands</p>
            </div>
            <button @click="showNewCampaign = true" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 flex items-center">
                <i class="fas fa-plus mr-2"></i> New Campaign
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg p-4 card-shadow">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Brand</label>
                <select x-model="filters.brand" @change="loadCampaigns()" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">All Brands</option>
                    <option value="buildly">Buildly</option>
                    <option value="foundry">First City Foundry</option>
                    <option value="openbuild">Open.Build</option>
                    <option value="radical">Radical</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                <select x-model="filters.status" @change="loadCampaigns()" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">All Status</option>
                    <option value="draft">Draft</option>
                    <option value="active">Active</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">View</label>
                <select x-model="viewMode" @change="updateView()" 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="campaigns">Campaigns</option>
                    <option value="calendar">Calendar</option>
                    <option value="tasks">Task Board</option>
                </select>
            </div>
            <div class="flex items-end">
                <button @click="exportData()" class="w-full bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                    <i class="fas fa-download mr-2"></i> Export
                </button>
            </div>
        </div>
    </div>

    <!-- Campaigns View -->
    <template x-if="viewMode === 'campaigns'">
        <div class="grid grid-cols-1 gap-6">
            <template x-for="campaign in campaigns" :key="campaign.id">
                <div class="bg-white rounded-lg p-6 card-shadow border-l-4" :class="getBrandColor(campaign.brand_name)">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900" x-text="campaign.campaign_name"></h3>
                            <p class="text-sm text-gray-600 mt-1" x-text="campaign.description"></p>
                        </div>
                        <span class="px-3 py-1 rounded-full text-sm font-medium" :class="getStatusBadge(campaign.status)" 
                              x-text="campaign.status.toUpperCase()"></span>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                        <div class="text-center">
                            <p class="text-xs text-gray-600">Goal</p>
                            <p class="text-lg font-bold text-gray-900" x-text="campaign.goal"></p>
                        </div>
                        <div class="text-center">
                            <p class="text-xs text-gray-600">Tasks</p>
                            <p class="text-lg font-bold text-gray-900" x-text="campaign.task_count"></p>
                        </div>
                        <div class="text-center">
                            <p class="text-xs text-gray-600">Completed</p>
                            <p class="text-lg font-bold text-green-600" x-text="campaign.completed_tasks"></p>
                        </div>
                        <div class="text-center">
                            <p class="text-xs text-gray-600">Progress</p>
                            <p class="text-lg font-bold text-blue-600" x-text="getProgress(campaign) + '%'"></p>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" :style="`width: ${getProgress(campaign)}%`"></div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button @click="viewCampaignTasks(campaign.id)" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                            View Tasks
                        </button>
                        <button @click="editCampaign(campaign)" class="flex-1 bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
                            Edit
                        </button>
                        <button @click="deleteCampaign(campaign.id)" class="flex-1 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                            Delete
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </template>

    <!-- Calendar View -->
    <template x-if="viewMode === 'calendar'">
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-xl font-bold">Calendar View</h2>
                <div class="flex gap-2">
                    <button @click="previousMonth()" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <span class="px-4 py-2 font-semibold" x-text="currentMonthDisplay"></span>
                    <button @click="nextMonth()" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-7 gap-2">
                <template x-for="day in ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']">
                    <div class="text-center font-bold text-gray-700 py-2" x-text="day"></div>
                </template>

                <template x-for="day in calendarDays" :key="day.date">
                    <div :class="day.isCurrentMonth ? 'bg-white' : 'bg-gray-100'" 
                         class="border border-gray-200 p-2 min-h-24 cursor-pointer hover:bg-blue-50"
                         @click="selectDate(day.date)">
                        <p class="font-semibold" x-text="day.day"></p>
                        <template x-for="task in day.tasks" :key="task.id">
                            <div class="mt-1 text-xs p-1 rounded bg-blue-200 text-blue-900" x-text="task.task_name"></div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- Tasks Board View -->
    <template x-if="viewMode === 'tasks'">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Draft Tasks -->
            <div class="bg-gray-50 rounded-lg p-4">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center">
                    <span class="w-3 h-3 bg-gray-400 rounded-full mr-2"></span> Draft
                </h3>
                <div class="space-y-3">
                    <template x-for="task in getTasksByStatus('draft')" :key="task.id">
                        <div class="bg-white p-3 rounded border-l-4 border-gray-400 cursor-move hover:shadow-md"
                             @click="viewTask(task)">
                            <p class="font-medium text-sm" x-text="task.task_name"></p>
                            <p class="text-xs text-gray-600 mt-1" x-text="task.platform"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- In Progress Tasks -->
            <div class="bg-yellow-50 rounded-lg p-4">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center">
                    <span class="w-3 h-3 bg-yellow-400 rounded-full mr-2"></span> In Progress
                </h3>
                <div class="space-y-3">
                    <template x-for="task in getTasksByStatus('in_progress')" :key="task.id">
                        <div class="bg-white p-3 rounded border-l-4 border-yellow-400 cursor-move hover:shadow-md"
                             @click="viewTask(task)">
                            <p class="font-medium text-sm" x-text="task.task_name"></p>
                            <p class="text-xs text-gray-600 mt-1" x-text="task.platform"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Completed Tasks -->
            <div class="bg-green-50 rounded-lg p-4">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center">
                    <span class="w-3 h-3 bg-green-400 rounded-full mr-2"></span> Completed
                </h3>
                <div class="space-y-3">
                    <template x-for="task in getTasksByStatus('completed')" :key="task.id">
                        <div class="bg-white p-3 rounded border-l-4 border-green-400 cursor-move hover:shadow-md"
                             @click="viewTask(task)">
                            <p class="font-medium text-sm line-through text-gray-600" x-text="task.task_name"></p>
                            <p class="text-xs text-gray-600 mt-1" x-text="task.platform"></p>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- Loading State -->
    <template x-if="loading">
        <div class="flex justify-center items-center p-12">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-600"></i>
        </div>
    </template>
</div>

<!-- New Campaign Modal -->
<div x-show="showNewCampaign" @click.self="showNewCampaign = false" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-transition>
    <div class="bg-white rounded-lg p-8 max-w-2xl w-full mx-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-bold">Create New Campaign</h2>
            <button @click="showNewCampaign = false" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form @submit.prevent="createCampaign()" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Brand</label>
                    <select x-model="newCampaign.brand_name" 
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                        <option value="">Select Brand</option>
                        <option value="buildly">Buildly</option>
                        <option value="foundry">First City Foundry</option>
                        <option value="openbuild">Open.Build</option>
                        <option value="radical">Radical</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Campaign Name</label>
                    <input type="text" x-model="newCampaign.campaign_name" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea x-model="newCampaign.description" rows="3"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Start Date</label>
                    <input type="date" x-model="newCampaign.start_date" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">End Date</label>
                    <input type="date" x-model="newCampaign.end_date" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Budget ($)</label>
                    <input type="number" x-model.number="newCampaign.budget" step="0.01"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="flex gap-3 justify-end pt-4">
                <button type="button" @click="showNewCampaign = false" 
                        class="px-4 py-2 bg-gray-300 text-gray-900 rounded-lg hover:bg-gray-400">
                    Cancel
                </button>
                <button type="submit" 
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                    Create Campaign
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function marketingCalendar() {
    return {
        campaigns: [],
        tasks: [],
        filters: { brand: '', status: '' },
        viewMode: 'campaigns',
        loading: false,
        showNewCampaign: false,
        currentMonth: new Date(),
        calendarDays: [],
        newCampaign: {
            brand_name: '',
            campaign_name: '',
            description: '',
            start_date: '',
            end_date: '',
            budget: 0
        },

        async loadCampaigns() {
            this.loading = true;
            try {
                const params = new URLSearchParams(this.filters);
                const response = await fetch(`/api/marketing/campaigns?${params}`);
                const data = await response.json();
                if (data.success) {
                    this.campaigns = data.data;
                    await this.loadAllTasks();
                }
            } catch (error) {
                console.error('Error loading campaigns:', error);
            } finally {
                this.loading = false;
            }
        },

        async loadAllTasks() {
            try {
                const response = await fetch(`/api/marketing/tasks?brand=${this.filters.brand}`);
                const data = await response.json();
                if (data.success) {
                    this.tasks = data.data;
                    this.updateCalendarDays();
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        },

        async createCampaign() {
            try {
                const response = await fetch('/api/marketing/campaigns', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.newCampaign)
                });
                const data = await response.json();
                if (data.success) {
                    alert('Campaign created successfully!');
                    this.showNewCampaign = false;
                    this.newCampaign = { brand_name: '', campaign_name: '', description: '', start_date: '', end_date: '', budget: 0 };
                    await this.loadCampaigns();
                }
            } catch (error) {
                console.error('Error creating campaign:', error);
            }
        },

        viewCampaignTasks(campaignId) {
            // Implementation for viewing campaign tasks
            alert(`Viewing tasks for campaign ${campaignId}`);
        },

        editCampaign(campaign) {
            // Implementation for editing campaign
            alert(`Editing campaign: ${campaign.campaign_name}`);
        },

        deleteCampaign(campaignId) {
            if (confirm('Are you sure you want to delete this campaign?')) {
                // Implementation for deleting campaign
                alert(`Deleted campaign ${campaignId}`);
                this.loadCampaigns();
            }
        },

        getBrandColor(brand) {
            const colors = {
                'buildly': 'border-blue-500',
                'foundry': 'border-orange-500',
                'openbuild': 'border-green-500',
                'radical': 'border-red-500'
            };
            return colors[brand] || 'border-gray-500';
        },

        getStatusBadge(status) {
            const badges = {
                'draft': 'bg-gray-200 text-gray-800',
                'active': 'bg-blue-200 text-blue-800',
                'completed': 'bg-green-200 text-green-800'
            };
            return badges[status] || 'bg-gray-200 text-gray-800';
        },

        getProgress(campaign) {
            if (campaign.task_count === 0) return 0;
            return Math.round((campaign.completed_tasks / campaign.task_count) * 100);
        },

        getTasksByStatus(status) {
            return this.tasks.filter(t => t.status === status);
        },

        updateView() {
            if (this.viewMode === 'calendar') {
                this.updateCalendarDays();
            }
        },

        updateCalendarDays() {
            // Generate calendar days for current month
            const year = this.currentMonth.getFullYear();
            const month = this.currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            this.calendarDays = [];
            
            // Previous month days
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());
            
            for (let i = 0; i < 42; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                
                this.calendarDays.push({
                    date: dateStr,
                    day: date.getDate(),
                    isCurrentMonth: date.getMonth() === month,
                    tasks: this.tasks.filter(t => t.scheduled_date.split('T')[0] === dateStr)
                });
            }
        },

        previousMonth() {
            this.currentMonth = new Date(this.currentMonth.getFullYear(), this.currentMonth.getMonth() - 1);
            this.updateCalendarDays();
        },

        nextMonth() {
            this.currentMonth = new Date(this.currentMonth.getFullYear(), this.currentMonth.getMonth() + 1);
            this.updateCalendarDays();
        },

        get currentMonthDisplay() {
            return this.currentMonth.toLocaleString('default', { month: 'long', year: 'numeric' });
        },

        viewTask(task) {
            alert(`Viewing task: ${task.task_name}`);
        },

        selectDate(date) {
            alert(`Creating task for ${date}`);
        },

        exportData() {
            // CSV export implementation
            alert('Exporting campaign data...');
        }
    };
}
</script>
{% endblock %}
