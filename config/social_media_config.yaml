# Social Media Configuration
# Platform settings and brand-specific configurations

general:
  platform_adaptations:
    twitter:
      max_length: 280
    linkedin:
      max_length: 3000
    mastodon:
      max_length: 500
    bluesky:
      max_length: 300
    instagram:
      max_length: 2200

  # Posting schedule (UTC)
  default_schedule:
    - "09:00"
    - "12:00"
    - "15:00"
    - "18:00"

  rate_limits:
    twitter:
      posts_per_day: 5
      min_interval_minutes: 60
    linkedin:
      posts_per_day: 3
      min_interval_minutes: 120
    mastodon:
      posts_per_day: 5
      min_interval_minutes: 60
    bluesky:
      posts_per_day: 5
      min_interval_minutes: 60

# Brand-specific platform configurations
# API keys should be set via environment variables (see .env.example)
brand_platforms:
  washoku:
    active_platforms:
      - twitter
      - linkedin
      - mastodon
      - bluesky
    content_themes:
      - healthy habits
      - gentle wellness
      - balance and calm
      - daily rituals

  northstar:
    active_platforms:
      - twitter
      - linkedin
    content_themes:
      - focus and clarity
      - productive routines
      - goal setting
      - progress tracking

  sunnyside:
    active_platforms:
      - twitter
      - linkedin
      - mastodon
      - bluesky
    content_themes:
      - simple daily habits
      - small wins
      - encouraging reminders
      - wellness education

  craftkit:
    active_platforms:
      - twitter
      - instagram
    content_themes:
      - creator tips
      - templates and workflows
      - design systems
      - content planning

  trailhead:
    active_platforms:
      - twitter
      - linkedin
    content_themes:
      - outdoor routines
      - travel planning
      - movement and recovery
      - weekend projects

# Mastodon account mappings
mastodon_accounts:
  BRAND1:
    instance_env: MASTODON_BRAND1_INSTANCE
    token_env: MASTODON_BRAND1_TOKEN
  BRAND2:
    instance_env: MASTODON_BRAND2_INSTANCE
    token_env: MASTODON_BRAND2_TOKEN
